<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UOW Session Dates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,500;0,700;0,800;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header-bar">
    <div class="header-left">
      <div class="uow-wordmark">U<span>O</span>W</div>
      <div class="header-rule"></div>
      <div class="header-subtitle">Student Services</div>
    </div>
  </div>

  <main>
    <div class="datetime-block">
      <div id="clock">--:--:--</div>
      <div id="date">Loading...</div>
    </div>

    <div class="accent-rule">
      <div class="r1"></div>
      <div class="r2"></div>
    </div>

    <div class="section-label">Active Sessions Today</div>
    <div id="sessions" class="sessions-grid"></div>
  </main>

  <footer>
    <div class="footer-dot"></div>
    <div class="footer-text">University of Wollongong &mdash; Session Dates</div>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
